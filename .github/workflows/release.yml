name: Release
# Builds the VSIX, creates a GitHub Release with it attached, and publishes to
# the VS Code Marketplace. Triggered manually so a publish is always deliberate.

on: [workflow_dispatch]

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build extension
        run: npm run compile

      - name: Package VSIX
        run: npx --yes @vscode/vsce package

      - name: Get current package version
        id: package_version
        uses: martinbeentjes/npm-get-version-action@3cf273023a0dda27efcd3164bdfb51908dd46a5b # v1.3.1

      - name: Check version is mentioned in Changelog
        uses: mindsers/changelog-reader-action@1faaf50aa09d5793d9a100819973df801febfb31 # v2.4.0
        id: changelog_reader
        with:
          version: ${{ steps.package_version.outputs.current-version }}
          path: 'CHANGELOG.md'

      - name: Create a GitHub Release
        id: create_release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.package_version.outputs.current-version }}
          name: ${{ steps.package_version.outputs.current-version }}
          body: ${{ steps.changelog_reader.outputs.changes }}
          files: '*.vsix'

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCODE_MARKETPLACE_TOKEN }}
        run: npx --yes @vscode/vsce publish --packagePath $(ls *.vsix)
